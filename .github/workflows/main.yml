name: Main CI/CD Pipeline

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    name: 🧹 Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Run Tests
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: xpose-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Lint & Test
        run: NO_BUILD=true ./run-in-docker.sh all

  build_release_binaries:
    name: 📦 Build Release for ${{ matrix.target }}
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    env:
      XPOSE_SERVER_URL: ${{ secrets.XPOSE_SERVER_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        if: matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'
        with:
          context: .
          load: true
          tags: xpose-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
        if: matrix.target != 'x86_64-unknown-linux-musl' && matrix.target != 'aarch64-unknown-linux-musl'
      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"-linux-musl" ]]; then
            TARGET_DIR=./target NO_BUILD=true ./run-in-docker.sh run bash -c "cd packages/cli && XPOSE_SERVER_URL=${XPOSE_SERVER_URL} CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-musl-gcc cargo build --release --locked --target ${{ matrix.target }}"
          else
            XPOSE_SERVER_URL=${XPOSE_SERVER_URL} cargo build --release --locked --target ${{ matrix.target }}
          fi
      - name: Archive Binary & Generate Checksum
        shell: bash
        run: |
          BIN_NAME="xpose"
          [[ "${{ matrix.os }}" == "windows-latest" ]] && BIN_NAME="xpose.exe"
          PKG_NAME="xpose-${{ matrix.target }}.tar.gz"
          tar -czvf "$PKG_NAME" -C target/${{ matrix.target }}/release "$BIN_NAME"
          [[ "${{ matrix.os }}" == "macos-latest" ]] && shasum -a 256 "$PKG_NAME" > "$PKG_NAME.sha256" || sha256sum "$PKG_NAME" > "$PKG_NAME.sha256"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            xpose-${{ matrix.target }}.tar.gz
            xpose-${{ matrix.target }}.tar.gz.sha256

  build_key_server:
    name: 🏗️ Build Key Server
    needs: lint-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: xpose-builder:latest
          cache-from: type=gha
      - name: Build Key Server
        run: |
          NO_BUILD=true ./run-in-docker.sh run bash -c "cd packages/key-server && worker-build --release"
      - name: Archive Key Server Build
        run: |
          tar -czvf key-server-build.tar.gz packages/key-server/build packages/key-server/wrangler.jsonc packages/key-server/migrations
      - name: Upload Key Server Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: key-server-build
          path: key-server-build.tar.gz

  deploy_key_server:
    name: 🚀 Deploy Key Server
    needs: [build_key_server, build_release_binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Download Key Server Artifacts
        uses: actions/download-artifact@v4
        with:
          name: key-server-build
      - name: Extract Artifacts
        run: tar -xzvf key-server-build.tar.gz
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wrangler
        working-directory: packages/key-server
        run: npm ci || npm install wrangler
      - name: Deploy to Cloudflare Workers
        working-directory: packages/key-server
        env:
          CLOUDFLARE_D1_ID: ${{ secrets.CLOUDFLARE_D1_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_WORKER_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          sed -i "s/__CLOUDFLARE_D1_ID__/${CLOUDFLARE_D1_ID}/g" wrangler.jsonc
          # Remove the build command so wrangler doesn't try to build again
          sed -i '/"build": {/,/},/d' wrangler.jsonc
          npx wrangler d1 migrations apply tunnel-db --remote
          npx wrangler deploy

  publish_release:
    name: 🚢 Publish Release
    needs: build_release_binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
            files: |
                **/*.tar.gz
                **/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Publish to NPM
        working-directory: packages/cli
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
