name: Main CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Lint job
  lint:
    name: 🧹 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Cargo & Target
        uses: actions/cache@v4
        with:
          path: |
            /tmp/cargo_registry
            /tmp/cargo_git
            /tmp/sccache_cache
            /tmp/target_cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: xpose-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Lint & Format
        run: NO_BUILD=true ./run-in-docker.sh lint

  # Test job
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Cargo & Target
        uses: actions/cache@v4
        with:
          path: |
            /tmp/cargo_registry
            /tmp/cargo_git
            /tmp/sccache_cache
            /tmp/target_cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: xpose-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run Tests
        run: NO_BUILD=true ./run-in-docker.sh test

  # Build release binaries (ONLY on tag push)
  build_release_binaries:
    name: 📦 Build Release for ${{ matrix.target }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Cargo & Target
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: actions/cache@v4
        with:
          path: |
            /tmp/cargo_registry
            /tmp/cargo_git
            /tmp/sccache_cache
            /tmp/target_cache
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-cargo-
      - name: Set up Docker Buildx
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image (with cache)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: xpose-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            TARGET_DIR=./target NO_BUILD=true ./run-in-docker.sh run bash -c "cd packages/cli && cargo build --release --target x86_64-unknown-linux-musl"
          else
            # For non-linux targets, use host toolchain (simplest for now)
            rustup target add ${{ matrix.target }}
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Archive Binary & Generate Checksum
        shell: bash
        run: |
          BIN_NAME="xpose"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN_NAME="xpose.exe"
          fi
          PKG_NAME="xpose-${{ matrix.target }}.tar.gz"
          tar -czvf "$PKG_NAME" -C target/${{ matrix.target }}/release "$BIN_NAME"
          
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            shasum -a 256 "$PKG_NAME" > "$PKG_NAME.sha256"
          else
            sha256sum "$PKG_NAME" > "$PKG_NAME.sha256"
          fi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            xpose-${{ matrix.target }}.tar.gz
            xpose-${{ matrix.target }}.tar.gz.sha256

  # Deploy key server (ONLY on tag push)
  deploy_key_server:
    name: 🚀 Deploy Key Server
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache Cargo & Target
        uses: actions/cache@v4
        with:
          path: |
            /tmp/cargo_registry
            /tmp/cargo_git
            /tmp/sccache_cache
            /tmp/target_cache
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker Image (with cache)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: xpose-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_D1_ID: ${{ secrets.CLOUDFLARE_D1_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          sed -i "s/__CLOUDFLARE_D1_ID__/${CLOUDFLARE_D1_ID}/g" packages/key-server/wrangler.jsonc
          NO_BUILD=true ./run-in-docker.sh run bash -c "cd packages/key-server && wrangler deploy"

  # Publish Release
  publish_release:
    name: 🚢 Publish Release
    needs: [build_release_binaries, deploy_key_server]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "**/*.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to NPM
        run: |
          NO_BUILD=true ./run-in-docker.sh run bash -c "
            cd packages/cli && 
            echo '//registry.npmjs.org/:_authToken=\${NPM_TOKEN}' > .npmrc && 
            npm publish --access public
          "
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
