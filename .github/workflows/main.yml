name: Main CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # This job builds the shared Docker image and saves it as an artifact
  build_base_image:
    name: 🏗️ Build Base Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t xpose-builder:latest .
          docker save xpose-builder:latest > xpose-builder.tar
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: xpose-builder
          path: xpose-builder.tar
          retention-days: 1

  # Lint job
  lint:
    name: 🧹 Lint & Format
    needs: build_base_image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: xpose-builder
      - name: Load Docker image
        run: docker load < xpose-builder.tar
      - name: Lint & Format
        run: |
          docker run --rm -v $(pwd):/workspace xpose-builder:latest bash -c "cargo fmt --all -- --check && cargo clippy --all-targets --all-features -- -D warnings"

  # Test job
  test:
    name: 🧪 Run Tests
    needs: build_base_image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: xpose-builder
      - name: Load Docker image
        run: docker load < xpose-builder.tar
      - name: Run Tests
        run: |
          docker run --rm -v $(pwd):/workspace xpose-builder:latest cargo test --workspace

  # Build release binaries (ONLY on tag push)
  build_release_binaries:
    name: 📦 Build Release for ${{ matrix.target }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            docker build -t xpose-builder .
            docker run --rm -v $(pwd):/workspace xpose-builder bash -c "cd packages/cli && cargo build --release --target x86_64-unknown-linux-musl"
          else
            # For non-linux targets, use host toolchain (simplest for now)
            rustup target add ${{ matrix.target }}
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Archive Binary & Generate Checksum
        shell: bash
        run: |
          BIN_NAME="xpose"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN_NAME="xpose.exe"
          fi
          PKG_NAME="xpose-${{ matrix.target }}.tar.gz"
          tar -czvf "$PKG_NAME" -C target/${{ matrix.target }}/release "$BIN_NAME"
          
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            shasum -a 256 "$PKG_NAME" > "$PKG_NAME.sha256"
          else
            sha256sum "$PKG_NAME" > "$PKG_NAME.sha256"
          fi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            xpose-${{ matrix.target }}.tar.gz
            xpose-${{ matrix.target }}.tar.gz.sha256

  # Deploy key server (ONLY on tag push)
  deploy_key_server:
    name: 🚀 Deploy Key Server
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: xpose-builder
      - name: Load Docker image
        run: docker load < xpose-builder.tar
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_D1_ID: ${{ secrets.CLOUDFLARE_D1_ID }}
        run: |
          sed -i "s/__CLOUDFLARE_D1_ID__/${CLOUDFLARE_D1_ID}/g" packages/key-server/wrangler.jsonc
          docker run --rm -v $(pwd):/workspace \
            -e CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }} \
            xpose-builder:latest bash -c "cd packages/key-server && wrangler deploy"

  # Publish Release
  publish_release:
    name: 🚢 Publish Release
    needs: [build_release_binaries, deploy_key_server]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "**/*.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to NPM
        run: |
          docker build -t xpose-publisher .
          docker run --rm -v $(pwd):/workspace -e NPM_TOKEN=${{ secrets.NPM_TOKEN }} xpose-publisher bash -c "
            cd packages/cli && 
            echo '//registry.npmjs.org/:_authToken=\${NPM_TOKEN}' > .npmrc && 
            npm publish --access public
          "
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
