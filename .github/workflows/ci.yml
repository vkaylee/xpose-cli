name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Build Docker Builder
        shell: bash
        run: docker build -t xpose-builder .

      - name: Lint & Format
        shell: bash
        run: |
          docker run --rm -v $(pwd):/workspace xpose-builder bash -c "cargo fmt --all -- --check && cargo clippy --all-targets --all-features -- -D warnings"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        shell: bash
        run: |
          docker run --rm -v $(pwd):/workspace xpose-builder cargo test --workspace
