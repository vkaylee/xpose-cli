name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/cli -> target

      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "x86_64-unknown-linux-musl" ]]; then
            # Build using our local Dockerfile for Linux
            docker build -t xpose-builder .
            docker run --rm -v $(pwd):/workspace xpose-builder bash -c "cd packages/cli && cargo build --release --target x86_64-unknown-linux-musl"
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        working-directory: .

      - name: Archive Binary
        shell: bash
        run: |
          BIN_NAME="xpose"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            BIN_NAME="xpose.exe"
            # Windows needs to find the bin in the package-specific target directory or root
            tar -czvf "xpose-${{ matrix.target }}.tar.gz" -C target/${{ matrix.target }}/release "$BIN_NAME"
          else
            tar -czvf "xpose-${{ matrix.target }}.tar.gz" -C target/${{ matrix.target }}/release "$BIN_NAME"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: xpose-${{ matrix.target }}.tar.gz

  deploy-key-server:
    name: Deploy Key Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Builder
        run: docker build -t xpose-builder .

      - name: Deploy to Cloudflare Workers
        run: |
          docker run --rm -v $(pwd):/workspace \
            -e CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }} \
            xpose-builder bash -c "cd packages/key-server && wrangler deploy"

  release:
    name: Publish Release
    needs: [build, deploy-key-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "**/*.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to NPM
        run: |
          # Use Docker to publish to ensure Node environment parity
          docker build -t xpose-publisher .
          docker run --rm -v $(pwd):/workspace -e NPM_TOKEN=${{ secrets.NPM_TOKEN }} xpose-publisher bash -c "
            cd packages/cli && \
            echo '//registry.npmjs.org/:_authToken=\${NPM_TOKEN}' > .npmrc && \
            npm publish --access public
          "
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
