name: Manage Stale Issues

on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly - Sunday at midnight
  workflow_dispatch:

jobs:
  stale:
    name: 🧹 Stale Issue Management
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.

            It will be closed in 14 days if no further activity occurs. If this issue is still relevant:
            - Add a comment with an update
            - Remove the `stale` label

            Thank you for your contributions! 🙏

          stale-pr-message: |
            This PR has been automatically marked as stale. Please update it or it will be closed in 14 days.

          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          
          days-before-stale: 60
          days-before-close: 14
          
          exempt-issue-labels: 'pinned,security,in-progress,feature-request'
          exempt-pr-labels: 'pinned,security,in-progress'
          
          remove-stale-when-updated: true
          ascending: false

      - name: Find long-standing PRs needing review
        if: github.event_name == 'schedule'
        run: |
          # Find PRs open for more than 30 days without updates
          prs=$(gh pr list --state open --search "created:<$(date -d '30 days ago' +%Y-%m-%d)" --json number,title,author | jq -r '.[] | "#\(.number) - \(.title) by @\(.author.login)"')
          
          if [ -n "$prs" ]; then
            echo "## Long-standing PRs needing attention" >> stale-prs.md
            echo "$prs" >> stale-prs.md
            echo "---" >> stale-prs.md
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create stale PRs report
        if: github.event_name == 'schedule'
        run: |
          if [ -f stale-prs.md ]; then
            gh issue create \
              --title "Weekly Stale PRs Report" \
              --body "$(cat stale-prs.md)" \
              --label "housekeeping"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
