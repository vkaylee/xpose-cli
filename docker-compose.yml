services:
  dev:
    build: .
    volumes:
      - .:/workspace
      - ~/.cargo/registry:/usr/local/cargo/registry
      - ~/.cargo/git:/usr/local/cargo/git
      - target-cache:/workspace/target
      - ~/.cache/sccache:/workspace/.sccache
    environment:
      - MT_TUNNEL_PORT=3000
    stdin_open: true
    tty: true

volumes:
  target-cache:
