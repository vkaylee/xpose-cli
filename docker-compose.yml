services:
  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/workspace
      - ${CARGO_HOME_REGISTRY:-~/.cargo/registry}:/usr/local/cargo/registry
      - ${CARGO_HOME_GIT:-~/.cargo/git}:/usr/local/cargo/git
      - ${TARGET_DIR:-target-cache}:/workspace/target
      - ${SCCACHE_CACHE_DIR:-sccache-cache}:/workspace/.sccache
    environment:
      - MT_TUNNEL_PORT=3000
      - SCCACHE_DIR=/workspace/.sccache
      - CLOUDFLARE_API_TOKEN
    stdin_open: true
    tty: true

volumes:
  target-cache:
  sccache-cache:
