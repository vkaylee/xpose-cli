services:
  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    tmpfs:
      - /workspace/.sccache:size=512m,mode=1777
      - /tmp:size=1g,mode=1777
    environment:
      - MT_TUNNEL_PORT=3000
      - SCCACHE_DIR=/workspace/.sccache
      - RUSTC_WRAPPER=sccache
      - CARGO_HOME=/usr/local/cargo
      - CLOUDFLARE_API_TOKEN
      - CLOUDFLARE_API_WORKER_TOKEN
    stdin_open: true
    tty: true
    shm_size: 2gb
    cpu_shares: 1024
    mem_limit: 8g
    healthcheck:
      test: [ "CMD", "cargo", "--version" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  cargo-registry:
  cargo-git:
