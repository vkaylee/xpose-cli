services:
  dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/workspace
      - ${CARGO_HOME_REGISTRY:-~/.cargo/registry}:/usr/local/cargo/registry
      - ${CARGO_HOME_GIT:-~/.cargo/git}:/usr/local/cargo/git
      - target-cache:/workspace/target
      - ${SCCACHE_CACHE_DIR:-~/.cache/sccache}:/workspace/.sccache
    environment:
      - MT_TUNNEL_PORT=3000
      - SCCACHE_DIR=/workspace/.sccache
    stdin_open: true
    tty: true

volumes:
  target-cache:
