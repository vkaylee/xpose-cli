[package]
name = "xpose"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5.60", features = ["derive"] }
console = "0.16.2"
crossterm = "0.29.0"
dotenvy = "0.15.7"
flate2 = "1.1.9"
indicatif = "0.18.4"
ratatui = "0.30.0"
